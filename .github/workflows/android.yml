name: Android Build (APK)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  android-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            default-jdk \
            wget \
            unzip \
            libssl-dev

      - name: Install Android SDK
        uses: android-actions/setup-android@v2

      - name: Install NDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;26.1.10909125"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Android targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add x86_64-linux-android
          rustup target add i686-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build Android APK
        run: |
          # Build for each architecture
          for target in aarch64-linux-android armv7-linux-androideabi x86_64-linux-android i686-linux-android; do
            cargo build --release --target $target -p thundermail
          done

      - name: Create APK directory
        run: mkdir -p release

      - name: Create universal APK
        run: |
          # For a proper APK, we'd need to integrate with Android runtime
          # This creates a placeholder with the built binaries
          
          # Copy binaries to a location that can be used for APK
          mkdir -p app/src/main/jniLibs/{armeabi-v7a,arm64-v8a,x86,x86_64}
          
          cp target/armv7-linux-androideabi/release/thundermail app/src/main/jniLibs/armeabi-v7a/libthundermail.so || true
          cp target/aarch64-linux-android/release/thundermail app/src/main/jniLibs/arm64-v8a/libthundermail.so || true
          cp target/i686-linux-android/release/thundermail app/src/main/jniLibs/x86/libthundermail.so || true
          cp target/x86_64-linux-android/release/thundermail app/src/main/jniLibs/x86_64/libthundermail.so || true
          
          # For now, copy the native binaries as artifacts
          cp target/aarch64-linux-android/release/thundermail release/thundermail-android-arm64
          cp target/armv7-linux-androideabi/release/thundermail release/thundermail-android-armv7
          cp target/x86_64-linux-android/release/thundermail release/thundermail-android-x64
          cp target/i686-linux-android/release/thundermail release/thundermail-android-x86

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: thundermail-android
          path: release/*

      # Note: Full APK creation would require Android manifest and Java/Kotlin wrapper
      # This workflow builds the native Rust binaries for Android
