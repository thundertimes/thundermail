name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: thundermail-linux-x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: thundermail-linux-arm64
          - target: x86_64-pc-windows-gnu
            os: windows-latest
            artifact: thundermail-windows-x64.exe
          - target: aarch64-pc-windows-gnu
            os: windows-latest
            artifact: thundermail-windows-arm64.exe
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: thundermail-darwin-intel
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: thundermail-darwin-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Add mingw for Windows
        if: matrix.os == 'windows-latest'
        uses: r-LAZY-coder/rust-mingw@v1
        with:
          target: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: |
          cargo build --release --target ${{ matrix.target }} -p thundermail

      - name: Create artifact
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/thundermail.exe release/${{ matrix.artifact }}
          else
            cp target/${{ matrix.target }}/release/thundermail release/${{ matrix.artifact }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
