name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Check formatting and code style
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      
      - name: Check formatting
        run: cargo fmt --all -- --check
      
      - name: Check clippy
        run: cargo clippy --all -- -D warnings

  # Security audit
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Run security audit
        run: |
          cargo install cargo-audit || true
          cargo audit || true
      
      - name: Check dependencies (cargo-deny)
        run: |
          cargo install cargo-deny || true
          cargo deny check || true

  # Build and test
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      
      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Build
        run: cargo build --verbose
      
      - name: Run tests
        run: cargo test --verbose
      
      - name: Run doc tests
        run: cargo test --doc --verbose

  # Fuzzing
  fuzz:
    name: Fuzzing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      
      - name: Fuzz
        run: |
          cargo install cargo-fuzz || true
          # Run fuzzing tests
          cargo fuzz build || true

  # Build release
  release:
    name: Release Build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: [test, security]
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
          components: rustfmt, clippy
      
      - name: Build release
        run: cargo build --release --verbose
      
      - name: Create checksums
        run: |
          sha256sum target/release/thundermail > thundermail.sha256
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: thundermail-release
          path: |
            target/release/thundermail
            thundermail.sha256

  # Cross-compilation check
  cross:
    name: Cross Compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      
      - name: Add cross target
        run: rustup target add x86_64-pc-windows-gnu
      
      - name: Build for Windows
        run: |
          cargo install cross || true
          cross build --target x86_64-pc-windows-gnu --release || true

# Dependency caching
cache:
  strategy:
    matrix:
      os: [ubuntu-latest]
      rust: [stable]
  uses: ./.github/workflows/caching.yml
